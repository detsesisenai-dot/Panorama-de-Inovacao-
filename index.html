<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foresight: O Paradoxo da Inovação & O Futuro de Goiás</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Traduz o React/JSX direto no navegador) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.1/babel.min.js"></script>

    <!-- Dependências obrigatórias para os gráficos (Recharts) -->
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; background-color: #ffffff;
        }
        .recharts-wrapper { width: 100% !important; }
        
        .matrix-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 50% 50%;
            background-position: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar } = window.Recharts;

        // --- Ícones Desenhados à Mão ---
        const IconTrendingDown = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>;
        const IconAlertTriangle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconTarget = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const IconMapPin = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconInfo = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>;
        const IconFileText = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconLeaf = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>;
        const IconCpu = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>;
        const IconTelescope = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.065 12.493-6.18 1.318a.934.934 0 0 1-1.108-.702l-.537-2.15a1.07 1.07 0 0 1 .691-1.265l13.504-4.44"></path><path d="m13.56 11.747 4.332-.924"></path><path d="m16 21-3.105-6.21"></path><path d="M16.485 5.94a2 2 0 0 1 1.455-2.425l1.09-.272a1 1 0 0 1 1.212.727l1.515 6.06a1 1 0 0 1-.727 1.213l-1.09.272a2 2 0 0 1-2.425-1.455z"></path><path d="m6.158 8.633 1.114 4.456"></path><path d="m8 21 3.105-6.21"></path><circle cx="12" cy="13" r="2"></circle></svg>;

        // --- DADOS ---
        const rankingData = [
            { year: '2015', Brasil: 70, India: 81, China: 29 },
            { year: '2018', Brasil: 64, India: 57, China: 17 },
            { year: '2021', Brasil: 57, India: 46, China: 12 },
            { year: '2025', Brasil: 52, India: 38, China: 10 },
        ];

        const patentsData = [
            { name: 'Qualcomm (Estrangeira)', val: 1002, type: 'ext' },
            { name: 'Huawei (Estrangeira)', val: 330, type: 'ext' },
            { name: 'Stellantis (Residente)', val: 185, type: 'br' },
            { name: 'Petrobras (Residente)', val: 155, type: 'br' },
            { name: 'UFCG (Residente)', val: 86, type: 'br' },
        ];

        const goiasRadarData = [
            { subject: 'Instituições', A: 90, fullMark: 100 },
            { subject: 'Economia', A: 75, fullMark: 100 },
            { subject: 'Infraestrutura', A: 65, fullMark: 100 },
            { subject: 'Cap. Humano', A: 60, fullMark: 100 },
            { subject: 'Negócios', A: 50, fullMark: 100 },
            { subject: 'Conhec. & Tec', A: 20, fullMark: 100 }, 
        ];

        // --- Componentes de UI e Animação ---
        const useIntersectionObserver = (options) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => { if (entry.isIntersecting) setIsVisible(true); });
                }, options);
                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);
                return () => { if (currentRef) observer.unobserve(currentRef); };
            }, [options]);
            return [domRef, isVisible];
        };

        const FadeIn = ({ children, delay = 0, className = "" }) => {
            const [ref, isVisible] = useIntersectionObserver({ threshold: 0.1 });
            return (
                <div ref={ref} style={{ transitionDelay: `${delay}ms`, transitionProperty: 'opacity, transform', transitionDuration: '1000ms' }}
                     className={`${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'} ${className}`}>
                    {children}
                </div>
            );
        };

        const NotaDidatica = ({ titulo, texto }) => (
            <div className="bg-slate-50 border-l-4 border-blue-500 rounded-r-xl p-5 my-6 flex items-start space-x-4 shadow-sm">
                <IconInfo className="text-blue-500 w-6 h-6 shrink-0 mt-1" />
                <div>
                    <h5 className="font-bold text-sm text-slate-800 mb-1">{titulo}</h5>
                    <p className="text-sm text-slate-600 leading-relaxed">{texto}</p>
                </div>
            </div>
        );

        const Fonte = ({ texto }) => (
            <div className="text-right mt-4">
                <span className="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Fonte: {texto}</span>
            </div>
        );

        function ForesightInfographic() {
            return (
                <div className="font-sans bg-white text-slate-900 selection:bg-blue-200">
                    
                    {/* HERO SECTION WITH BACKGROUND IMAGE */}
                    <section className="min-h-screen flex flex-col justify-center items-center px-6 py-20 text-center relative overflow-hidden bg-slate-900">
                        {/* Imagem de Fundo com Overlay Escuro */}
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80" alt="" className="w-full h-full object-cover opacity-30 mix-blend-luminosity" />
                            <div className="absolute inset-0 bg-gradient-to-b from-slate-900/50 via-slate-900/80 to-slate-900"></div>
                        </div>
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 via-emerald-500 to-rose-600 z-10"></div>
                        
                        <FadeIn className="z-10 text-white">
                            <p className="text-sm md:text-base font-bold tracking-widest uppercase text-slate-400 mb-6 flex items-center justify-center gap-2">
                                <IconTelescope className="w-5 h-5"/> Estudo de Foresight Estratégico
                            </p>
                            <h1 className="text-5xl md:text-8xl font-black tracking-tighter leading-tight mb-8 max-w-5xl">
                                O Problema é <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Conversão</span>, não apenas Insumo.
                            </h1>
                            <p className="text-xl md:text-3xl font-light text-slate-300 max-w-4xl mx-auto leading-relaxed mb-10">
                                O Brasil tem matéria-prima institucional, o agro é forte e o fomento existe. Mas o sistema patina na hora de transformar isso em <strong className="font-bold text-white">tecnologia global e soberania.</strong>
                            </p>
                            
                            <div className="max-w-3xl mx-auto bg-slate-800/50 backdrop-blur-md border border-slate-700 rounded-2xl p-6 text-left shadow-2xl">
                                <p className="text-slate-300 leading-relaxed text-sm md:text-base">
                                    <strong>O Contexto:</strong> Foresight Estratégico não é sobre "adivinhar" o futuro, mas mapear os caminhos possíveis para construí-lo. Nos últimos 10 anos, assistimos a uma reconfiguração global do poder tecnológico. O que parecia uma corrida de recursos financeiros revelou-se um jogo brutal de <em>consistência e conversão</em>. Este estudo traduz essa realidade e aponta a janela de oportunidade para o estado de Goiás.
                                </p>
                            </div>
                        </FadeIn>
                        <div className="mt-12 animate-bounce text-slate-500 z-10">
                            <IconTrendingDown className="w-8 h-8" />
                        </div>
                    </section>

                    {/* THE MACRO VIEW: GII 2025 & PATENTS */}
                    <section className="py-24 px-6 bg-white border-b border-slate-100">
                        <div className="max-w-7xl mx-auto">
                            <FadeIn>
                                <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-6 text-center">O Choque de Realidade Global</h2>
                                <p className="text-lg md:text-xl text-slate-500 text-center max-w-3xl mx-auto mb-10">
                                    O Índice Global de Inovação expõe nossa maior contradição: temos bons insumos, mas perdemos a corrida estrutural e de resultados para a Ásia Central e Meridional.
                                </p>
                                <NotaDidatica 
                                    titulo="O que significa ser um 'Overperformer'?" 
                                    texto="O Brasil é classificado há 5 anos como overperformer porque entrega 'mais inovação do que seria esperado para o seu nível de riqueza (PIB per capita)'. É um mérito, mas é ilusório: significa que fazemos milagre com o que temos, mas ainda não possuímos a máquina de conversão pesada da China ou o dinamismo agressivo de software da Índia."
                                />
                            </FadeIn>
                            
                            <div className="grid lg:grid-cols-2 gap-16 items-center mt-16">
                                {/* Chart: The Flip */}
                                <FadeIn delay={200}>
                                    <div className="bg-slate-50 p-6 rounded-3xl shadow-sm border border-slate-200">
                                        <h3 className="text-center font-bold text-slate-800 mb-2 uppercase tracking-wide text-sm">A Ultrapassagem Asiática (GII)</h3>
                                        <div className="h-72 w-full mt-4">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={rankingData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                    <XAxis dataKey="year" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontWeight: 'bold'}} />
                                                    <YAxis reversed axisLine={false} tickLine={false} tick={{fill: '#64748b'}} domain={[1, 90]} />
                                                    <Tooltip contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 25px rgba(0,0,0,0.1)' }} />
                                                    <Legend iconType="circle" wrapperStyle={{ paddingTop: '10px' }}/>
                                                    <Line type="monotone" dataKey="Brasil" stroke="#e11d48" strokeWidth={4} dot={{r: 4}} />
                                                    <Line type="monotone" dataKey="India" name="Índia" stroke="#2563eb" strokeWidth={4} dot={{r: 4}} />
                                                    <Line type="monotone" dataKey="China" stroke="#0f172a" strokeWidth={4} dot={{r: 4}} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-4 text-center">Atenção: Linhas em queda (direção ao eixo 1) representam subida no ranking global.</p>
                                        <Fonte texto="Índice Global de Inovação (GII) 2015-2025" />
                                    </div>
                                </FadeIn>

                                {/* Text & Patents */}
                                <FadeIn delay={400} className="space-y-8">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-3">O Esforço sem Foco</h3>
                                        <p className="text-slate-600 leading-relaxed">
                                            O Brasil investiu <strong>1,19% do PIB</strong> em P&D em 2023. É um patamar superior ao da Índia, mas abaixo das economias líderes (>2.5%). O gargalo não é só o volume, é a falta de conexão com empresas. Pesquisa sem mercado vira currículo; pesquisa com mercado vira vantagem competitiva.
                                        </p>
                                    </div>
                                    
                                    <div className="bg-slate-900 text-white p-8 rounded-3xl relative overflow-hidden shadow-xl">
                                        <IconFileText className="absolute -right-4 -top-4 w-32 h-32 opacity-10" />
                                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                                            <IconAlertTriangle className="text-rose-500"/> Retrato do INPI (2024)
                                        </h3>
                                        <p className="text-slate-300 text-sm mb-6">Pedidos de patentes de invenção no Brasil revelam nossa dependência estrangeira na fronteira tecnológica:</p>
                                        
                                        <div className="space-y-4">
                                            {patentsData.map((item, idx) => (
                                                <div key={idx}>
                                                    <div className="flex justify-between text-sm mb-1">
                                                        <span className={item.type === 'ext' ? 'text-rose-400 font-medium' : 'text-slate-300'}>{item.name}</span>
                                                        <span className="font-bold">{item.val} pedidos</span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 rounded-full h-1.5">
                                                        <div className={`h-1.5 rounded-full ${item.type === 'ext' ? 'bg-rose-500' : 'bg-slate-500'}`} style={{width: `${(item.val/1002)*100}%`}}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <Fonte texto="INPI - Instituto Nacional da Propriedade Industrial (2025)" />
                                    </div>
                                </FadeIn>
                            </div>
                        </div>
                    </section>

                    {/* THE INFRASTRUCTURE (LEI DO BEM, EMBRAPII, FINEP) */}
                    <section className="py-24 bg-slate-50 px-6">
                        <div className="max-w-6xl mx-auto">
                            <FadeIn>
                                <div className="text-center mb-10">
                                    <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-6">A Infraestrutura Existe</h2>
                                    <p className="text-lg text-slate-600 max-w-3xl mx-auto">
                                        Não partimos do zero. O Brasil possui ferramentas sofisticadas de financiamento, mas que frequentemente acabam premiando a rotina em vez da ruptura.
                                    </p>
                                </div>
                                <NotaDidatica 
                                    titulo="Inovação Incremental vs. Disruptiva (Deep Tech)" 
                                    texto="A inovação incremental melhora o que já existe (ex: um motor de carro 10% mais econômico). É vital para a sobrevivência das empresas hoje. Já a inovação disruptiva ou Deep Tech cria novos paradigmas (ex: um motor movido a hidrogênio verde). Hoje, grande parte dos incentivos fiscais brasileiros financia o incremental. Precisamos migrar recursos para o risco real."
                                />
                            </FadeIn>
                            
                            <div className="grid md:grid-cols-3 gap-8 mt-12 text-left">
                                <FadeIn delay={100}>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-full flex flex-col justify-between">
                                        <div>
                                            <div className="text-4xl font-black text-emerald-600 mb-2">R$ 51.6 Bi</div>
                                            <h3 className="font-bold text-lg mb-3">Lei do Bem (2024)</h3>
                                            <p className="text-slate-600 text-sm mb-4">Mobilizados via renúncia fiscal. Ajuda 4.2 mil empresas, mas tende a favorecer adaptações e melhorias de produtos já existentes.</p>
                                        </div>
                                        <Fonte texto="MCTI" />
                                    </div>
                                </FadeIn>
                                <FadeIn delay={300}>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-full flex flex-col justify-between">
                                        <div>
                                            <div className="text-4xl font-black text-blue-600 mb-2">811</div>
                                            <h3 className="font-bold text-lg mb-3">Novos Projetos EMBRAPII</h3>
                                            <p className="text-slate-600 text-sm mb-4">A rede bateu recorde porque atua na dor: divide o risco financeiro e une o laboratório de pesquisa à fábrica da empresa.</p>
                                        </div>
                                        <Fonte texto="EMBRAPII" />
                                    </div>
                                </FadeIn>
                                <FadeIn delay={500}>
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-full flex flex-col justify-between">
                                        <div>
                                            <div className="text-4xl font-black text-rose-600 mb-2">FNDCT</div>
                                            <h3 className="font-bold text-lg mb-3">O Fundo Principal</h3>
                                            <p className="text-slate-600 text-sm mb-4">A Lei 177 proibiu limites de execução para evitar calotes na ciência. Porém, o fundo precisa operar como portfólio de Estado, não colcha de editais.</p>
                                        </div>
                                        <Fonte texto="Finep / FNDCT" />
                                    </div>
                                </FadeIn>
                            </div>
                        </div>
                    </section>

                    {/* IMAGE DIVIDER - LAB/DEEP TECH */}
                    <div className="w-full h-64 md:h-96 relative">
                        <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1920&q=80" alt="" className="w-full h-full object-cover grayscale" />
                        <div className="absolute inset-0 bg-blue-900/60 mix-blend-multiply"></div>
                        <div className="absolute inset-0 flex items-center justify-center">
                            <h2 className="text-3xl md:text-5xl font-black text-white tracking-tighter text-center px-4">O salto exige direcionamento.</h2>
                        </div>
                    </div>

                    {/* SECTORS OF THE FUTURE */}
                    <section className="py-24 px-6 bg-slate-900 text-white">
                        <div className="max-w-6xl mx-auto">
                            <FadeIn>
                                <div className="text-center mb-10">
                                    <h2 className="text-4xl md:text-5xl font-bold tracking-tight mb-4">Setores Portadores de Futuro</h2>
                                    <p className="text-slate-400 text-lg max-w-3xl mx-auto">Onde o Brasil deve aportar suas fichas para garantir soberania, baseado na Estratégia Nacional (ENCTI) e na Nova Indústria Brasil.</p>
                                </div>
                            </FadeIn>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {[
                                    { title: "Agro, Agritech & Bioinsumos", icon: <IconLeaf className="w-8 h-8"/>, desc: "Transformar a altíssima produtividade tropical em tecnologia (sensores, biológicos) 100% exportável." },
                                    { title: "Bioeconomia & Biodiversidade", icon: <IconMapPin className="w-8 h-8"/>, desc: "Cadeias de fármacos, cosméticos e biomateriais baseados na vantagem natural única das nossas florestas e cerrados." },
                                    { title: "IA Aplicada & Software", icon: <IconCpu className="w-8 h-8"/>, desc: "O Plano PBIA prevê R$ 23 Bi. A IA não será apenas ChatGPT; será a camada de automação para indústria e logística." },
                                    { title: "Saúde & Biotecnologia", icon: <IconTarget className="w-8 h-8"/>, desc: "Soberania sanitária. Reduzir a dependência externa (fármacos importados) e alavancar a saúde de precisão." },
                                    { title: "Energia Limpa & Descarbonização", icon: <IconTrendingDown className="w-8 h-8"/>, desc: "Hidrogênio de baixo carbono, Combustível de Aviação Sustentável (SAF) e redes elétricas inteligentes." },
                                    { title: "Semicondutores & Minerais", icon: <IconAlertTriangle className="w-8 h-8"/>, desc: "Foco em nichos onde podemos vencer: design de chips, encapsulamento e rastreabilidade de minerais críticos." },
                                ].map((sector, i) => (
                                    <FadeIn key={i} delay={i * 100}>
                                        <div className="bg-slate-800/50 border border-slate-700 p-6 rounded-2xl hover:bg-slate-700 transition duration-300">
                                            <div className="text-emerald-400 mb-4">{sector.icon}</div>
                                            <h4 className="font-bold text-lg mb-2">{sector.title}</h4>
                                            <p className="text-sm text-slate-400">{sector.desc}</p>
                                        </div>
                                    </FadeIn>
                                ))}
                            </div>
                            <Fonte texto="Estratégia Nacional de Ciência, Tecnologia e Inovação (ENCTI 2024–2034)" />
                        </div>
                    </section>

                    {/* DEEP DIVE: GOIÁS */}
                    <section className="py-24 bg-white px-6">
                        <div className="max-w-6xl mx-auto">
                            <FadeIn>
                                <div className="text-center mb-10">
                                    <span className="bg-emerald-100 text-emerald-800 px-4 py-1 rounded-full text-sm font-bold tracking-wide">Recorte Regional & Localização Espacial</span>
                                    <h2 className="text-4xl md:text-6xl font-bold tracking-tight mt-6 mb-4">O Diagnóstico de Goiás</h2>
                                    <p className="text-xl text-slate-600 max-w-3xl mx-auto">
