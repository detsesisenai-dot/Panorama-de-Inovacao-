        // --- Hooks & Components ---
        const useIntersectionObserver = (options) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => { if (entry.isIntersecting) setIsVisible(true); });
                }, options);
                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);
                return () => { if (currentRef) observer.unobserve(currentRef); };
            }, [options]);
            return [domRef, isVisible];
        };

        const FadeIn = ({ children, delay = 0, className = "" }) => {
            const [ref, isVisible] = useIntersectionObserver({ threshold: 0.1 });
            return (
                <div ref={ref} style={{ transitionDelay: `${delay}ms`, transitionProperty: 'opacity, transform', transitionDuration: '1000ms' }}

                                            <button onClick={() => setSimPriv(1)} className={`w-full text-left p-4 rounded-xl border-2 transition-all ${simPriv === 1 ? 'bg-emerald-600/20 border-emerald-500' : 'border-slate-700 hover:border-slate-500'}`}><span className="block text-sm font-bold mb-1 text-white">Deep Tech / CVC</span><span className="text-xs text-slate-400">Apetite a risco e apoio a startups locais.</span></button>

                        <div className="bg-slate-50 py-16 px-6">

                                    <div className="flex items-center gap-2 mb-3 relative z-10">
                                        <IconTelescope className="w-5 h-5 text-blue-500" />
                                        <h5 className="font-bold text-sm text-slate-800 uppercase tracking-wide">Nota de Foresight</h5>
                                    </div>
                                    <p className="text-sm text-slate-600 leading-relaxed relative z-10">
                                        O <strong>Foresight Estratégico</strong> não "prevê" o futuro de forma determinística, como se ele fosse um destino imutável. Trata-se de uma disciplina de mapeamento que subsidia a construção de cenários <em>(possíveis, plausíveis e preferíveis)</em>. <br/><br/>
                                        Seu propósito é instigar tomadores de decisão a agir com intencionalidade hoje. Afinal, <strong>o futuro não está dado; ele é construído.</strong>
                                    </p>
                                </div>
                            </div>
                        </div>

            );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ForesightInfographic />);
